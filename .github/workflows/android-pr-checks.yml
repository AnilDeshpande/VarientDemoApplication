name: Android PR Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Run checks and debug build
        env:
          # PR validation uses CI-safe placeholder values.
          # It should not require release signing secrets.
          ANALYTICS_SDK_KEY: pr-demo-analytics-key
          BACKEND_TOKEN_QA: pr-demo-qa-token
          BACKEND_TOKEN_STAGING: pr-demo-staging-token
          BACKEND_TOKEN_PROD: pr-demo-prod-token
          AD_SDK_KEY_FREE: pr-demo-free-ad-key
          AD_SDK_KEY_PAID: pr-demo-paid-ad-key
        run: |
          chmod +x ./gradlew
          ./gradlew testQaFreeDebugUnitTest lintQaFreeDebug assembleQaFreeDebug
